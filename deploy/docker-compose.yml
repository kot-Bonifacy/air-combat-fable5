# Faza 7: publiczne demo single-player — dogfight.tatanga.eu, port zewn. 8087.
# Build context = korzeń repo (..), bo monorepo workspaces (shared + client).
# Bez klucza `version:` (przestarzały — ostrzeżenie). Backend (serwer WS) dojdzie
# w fazie 13 — szkielet niżej, zakomentowany (wtedy też odkomentować /ws w nginx.conf).
services:
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: dogfight
    ports:
      - '8087:80'
    restart: unless-stopped

