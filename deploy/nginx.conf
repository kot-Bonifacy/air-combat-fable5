# Faza 7: statyczne demo (jedna strona). Blok /ws jest gotowy do odkomentowania
# w fazie 13 (backend WebSocket). UWAGA: bez bloku `types {}` w `server` —
# nadpisuje domyślne MIME (lekcja z clear-context).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Kompresja tekstu (JS/HTML/glTF JSON). Binaria i PNG są już skompresowane.
    gzip on;
    gzip_types text/css application/javascript application/json model/gltf+json image/svg+xml;
    gzip_min_length 1024;

    # Bundle Vite z hashem w nazwie (/assets/*) — cache na zawsze, bezpiecznie.
    # Jeden nagłówek Cache-Control (bez `expires`, które dokładałoby drugi).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Model 3D i tekstury (assets/ z repo) — duże, rzadko się zmieniają.
    location /models/ {
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # SPA: nieznane ścieżki → index.html (gra to pojedyncza strona).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- faza 13: proxy do backendu WebSocket (odkomentować razem z usługą backend) ---
    # location /ws {
    #     proxy_pass http://backend:3001;
