<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Air Combat</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      #hud {
        position: fixed;
        top: 50%;
        left: 14px;
        transform: translateY(-50%);
        font: 400 18px/1.4 monospace;
        color: #eaf3ff;
        white-space: pre;
        pointer-events: none;
        /* spójnie z offline: miękki cień zamiast twardego obrysu */
        text-shadow:
          0 1px 2px rgba(0, 0, 0, 0.9),
          0 0 6px rgba(0, 0, 0, 0.75);
      }
      /* celownik myszy + znacznik nosa (parytet z SP, faza 14) */
      #reticle {
        position: fixed;
        width: 26px;
        height: 26px;
        margin: -13px 0 0 -13px;
        border: 2px solid rgba(120, 255, 140, 0.9);
        border-radius: 50%;
        pointer-events: none;
        display: none;
      }
      #reticle::after {
        content: '';
        position: absolute;
        left: 50%;
        top: 50%;
        width: 4px;
        height: 4px;
        margin: -2px 0 0 -2px;
        background: rgba(120, 255, 140, 0.9);
        border-radius: 50%;
      }
      #nose-marker {
        position: fixed;
        width: 14px;
        height: 14px;
        margin: -7px 0 0 -7px;
        pointer-events: none;
        display: none;
        color: rgba(255, 220, 100, 0.85);
        font: 14px/14px monospace;
        text-align: center;
      }
      /* alert granicy areny / rozbicia (faza 14) */
      #arena-alert {
        position: fixed;
        top: 28%;
        left: 50%;
        transform: translateX(-50%);
        font: bold 20px/1.3 monospace;
        letter-spacing: 2px;
        pointer-events: none;
        opacity: 0;
        white-space: pre;
      }
      #arena-alert.warning {
        color: #fc5;
        text-shadow: 0 0 8px rgba(255, 200, 80, 0.7);
      }
      #arena-alert.crash {
        color: #f44;
        text-shadow: 0 0 12px rgba(255, 60, 60, 0.8);
      }
      /* ostrzeżenie przeciągnięcia / buffetu / szarzenia (faza 14, sterowane przez Hud) */
      #stall-warning {
        position: fixed;
        top: 18%;
        left: 50%;
        transform: translateX(-50%);
        font: bold 26px/1.2 monospace;
        letter-spacing: 4px;
        pointer-events: none;
        opacity: 0;
      }
      #stall-warning.stall {
        color: #f44;
        text-shadow: 0 0 12px rgba(255, 60, 60, 0.8);
      }
      #stall-warning.buffet {
        color: #fa3;
        text-shadow: 0 0 8px rgba(255, 170, 50, 0.7);
      }
      /* sztuczny horyzont (faza 14) */
      #horizon {
        position: fixed;
        right: 24px;
        bottom: 24px;
        width: 110px;
        height: 110px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid rgba(200, 220, 240, 0.5);
        pointer-events: none;
        display: none;
      }
      #horizon-disc {
        position: absolute;
        left: -55px;
        top: -55px;
        width: 220px;
        height: 220px;
        background: linear-gradient(
          to bottom,
          #2a5d8f 0%,
          #2a5d8f 50%,
          #6b4a2b 50%,
          #6b4a2b 100%
        );
      }
      #horizon::after {
        content: '';
        position: absolute;
        left: 15px;
        right: 15px;
        top: 50%;
        height: 0;
        border-top: 2px solid rgba(255, 240, 120, 0.95);
      }
      /* znacznik trafienia w środku ekranu (faza 11) */
      #hit-marker {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font: 28px/1 monospace;
        color: rgba(255, 255, 255, 0.95);
        text-shadow: 0 0 4px rgba(0, 0, 0, 0.9);
        pointer-events: none;
        opacity: 0;
      }
      #hit-marker.kill {
        color: #ff5a3c;
        font-size: 40px;
        text-shadow: 0 0 10px rgba(255, 90, 60, 0.9);
      }
      /* kill feed: kto kogo zestrzelił (faza 11) */
      #kill-feed {
        position: fixed;
        top: 78px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        font: bold 15px/1.3 monospace;
        color: #ffd24a;
        text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
        pointer-events: none;
      }
      /* nakładka stanu połączenia: łączenie / błąd / rozłączono */
      #conn-overlay {
        position: fixed;
        inset: 0;
        z-index: 48;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
        background: rgba(7, 13, 21, 0.82);
        color: #cde;
        font: 16px/1.5 monospace;
      }
      #conn-overlay.show {
        display: flex;
      }
      #conn-overlay .head {
        font: 700 24px monospace;
        color: #ff6a4a;
      }
      #conn-overlay .msg {
        max-width: 540px;
        color: #cdd;
      }
      #conn-overlay button {
        font: 600 15px/1 monospace;
        padding: 10px 20px;
        cursor: pointer;
        color: #cde;
        background: rgba(40, 60, 80, 0.9);
        border: 1px solid #4a6c8c;
        border-radius: 6px;
      }
      #loading {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: radial-gradient(circle at 50% 38%, #16314a 0%, #070d15 75%);
        color: #cde;
        font: 600 18px/1.4 monospace;
        letter-spacing: 1px;
        transition: opacity 0.4s ease;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #loading .title {
        font-size: 26px;
        color: #ffd24a;
        letter-spacing: 2px;
      }
      #loading .spinner {
        width: 46px;
        height: 46px;
        border: 4px solid rgba(143, 208, 255, 0.25);
        border-top-color: #8fd0ff;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #webgl-error {
        position: fixed;
        inset: 0;
        z-index: 60;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 24px;
        box-sizing: border-box;
        text-align: center;
        background: rgba(7, 13, 21, 0.96);
        color: #cde;
        font: 15px/1.5 monospace;
      }
      #webgl-error.show {
        display: flex;
      }
      #webgl-error .head {
        font: 700 22px monospace;
        color: #ff6a4a;
      }
      #webgl-error button {
        font: 600 15px/1 monospace;
        padding: 10px 20px;
        margin-top: 6px;
        cursor: pointer;
        color: #cde;
        background: rgba(40, 60, 80, 0.9);
        border: 1px solid #4a6c8c;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <div id="reticle"></div>
    <div id="nose-marker">+</div>
    <div id="stall-warning"></div>
    <div id="arena-alert"></div>
    <div id="horizon"><div id="horizon-disc"></div></div>
    <div id="hit-marker">✕</div>
    <div id="kill-feed"></div>
    <div id="conn-overlay"></div>
    <div id="loading">
      <div class="title">AIR COMBAT</div>
      <div class="spinner"></div>
      <div id="loading-status">Łączenie z serwerem…</div>
    </div>
    <div id="webgl-error">
      <div class="head">Grafika 3D niedostępna</div>
      <div>
        Przeglądarka utraciła kontekst WebGL albo go nie obsługuje.<br />
        Sprawdź, czy włączona jest akceleracja sprzętowa, i odśwież stronę.
      </div>
      <button onclick="location.reload()">Odśwież</button>
    </div>
    <script type="module" src="/src/online-main.ts"></script>
  </body>
</html>
