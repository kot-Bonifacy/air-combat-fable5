<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>air-combat-fable5</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      #hud {
        position: fixed;
        top: 50%;
        left: 14px;
        transform: translateY(-50%);
        font: 600 22px/1.35 monospace;
        color: #eaf3ff;
        background: transparent;
        padding: 0;
        white-space: pre;
        pointer-events: none;
        /* tło w pełni przezroczyste → obrys + cień, by tekst był czytelny nad jasnym niebem */
        text-shadow:
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000,
          0 0 6px rgba(0, 0, 0, 0.9);
      }
      #net-status {
        position: fixed;
        top: 8px;
        right: 8px;
        font: 13px/1.4 monospace;
        color: #9f9;
        background: rgba(0, 0, 0, 0.55);
        padding: 4px 8px;
        border-radius: 4px;
        pointer-events: none;
      }
      #reticle {
        position: fixed;
        width: 26px;
        height: 26px;
        margin: -13px 0 0 -13px;
        border: 2px solid rgba(120, 255, 140, 0.9);
        border-radius: 50%;
        pointer-events: none;
        display: none;
      }
      #reticle::after {
        content: '';
        position: absolute;
        left: 50%;
        top: 50%;
        width: 4px;
        height: 4px;
        margin: -2px 0 0 -2px;
        background: rgba(120, 255, 140, 0.9);
        border-radius: 50%;
      }
      #nose-marker {
        position: fixed;
        width: 14px;
        height: 14px;
        margin: -7px 0 0 -7px;
        pointer-events: none;
        display: none;
        color: rgba(255, 220, 100, 0.85);
        font: 14px/14px monospace;
        text-align: center;
      }
      #arena-alert {
        position: fixed;
        top: 28%;
        left: 50%;
        transform: translateX(-50%);
        font: bold 20px/1.3 monospace;
        letter-spacing: 2px;
        pointer-events: none;
        opacity: 0;
        white-space: pre;
      }
      #arena-alert.warning {
        color: #fc5;
        text-shadow: 0 0 8px rgba(255, 200, 80, 0.7);
      }
      #arena-alert.outside {
        color: #f63;
        text-shadow: 0 0 10px rgba(255, 100, 50, 0.8);
      }
      #arena-alert.crash {
        color: #f44;
        text-shadow: 0 0 12px rgba(255, 60, 60, 0.8);
      }
      #hit-marker {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font: 28px/1 monospace;
        color: rgba(255, 255, 255, 0.95);
        text-shadow: 0 0 4px rgba(0, 0, 0, 0.9);
        pointer-events: none;
        opacity: 0;
      }
      #hit-marker.kill {
        color: #ff5a3c;
        font-size: 40px;
        text-shadow: 0 0 10px rgba(255, 90, 60, 0.9);
      }
      #kill-feed {
        position: fixed;
        top: 78px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        font: bold 15px/1.3 monospace;
        color: #ffd24a;
        text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
        pointer-events: none;
      }
      #stall-warning {
        position: fixed;
        top: 18%;
        left: 50%;
        transform: translateX(-50%);
        font: bold 26px/1.2 monospace;
        letter-spacing: 4px;
        pointer-events: none;
        opacity: 0;
      }
      #stall-warning.stall {
        color: #f44;
        text-shadow: 0 0 12px rgba(255, 60, 60, 0.8);
      }
      #stall-warning.buffet {
        color: #fa3;
        text-shadow: 0 0 8px rgba(255, 170, 50, 0.7);
      }
      #horizon {
        position: fixed;
        right: 24px;
        bottom: 24px;
        width: 110px;
        height: 110px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid rgba(200, 220, 240, 0.5);
        pointer-events: none;
      }
      #horizon-disc {
        position: absolute;
        left: -55px;
        top: -55px;
        width: 220px;
        height: 220px;
        background: linear-gradient(
          to bottom,
          #2a5d8f 0%,
          #2a5d8f 50%,
          #6b4a2b 50%,
          #6b4a2b 100%
        );
      }
      #horizon::after {
        content: '';
        position: absolute;
        left: 15px;
        right: 15px;
        top: 50%;
        height: 0;
        border-top: 2px solid rgba(255, 240, 120, 0.95);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <div id="net-status">łączenie…</div>
    <div id="reticle"></div>
    <div id="nose-marker">+</div>
    <div id="hit-marker">✕</div>
    <div id="kill-feed"></div>
    <div id="stall-warning"></div>
    <div id="arena-alert"></div>
    <div id="horizon"><div id="horizon-disc"></div></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
